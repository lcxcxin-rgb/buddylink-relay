<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuddyLink</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- 拖拽栏 -->
    <div id="drag-bar" data-tauri-drag-region>
      <div id="drag-indicator">
        <svg width="24" height="4" viewBox="0 0 24 4"><rect width="24" height="4" rx="2" fill="rgba(0,0,0,0.15)"/></svg>
      </div>
      <div id="app-title">BuddyLink</div>
      <div class="window-controls">
        <div id="collapse-btn" onclick="minimizeWindow()" title="折叠">
          <svg width="14" height="14" viewBox="0 0 14 14">
            <circle cx="7" cy="7" r="6" fill="#FF5F57" stroke="#E04640" stroke-width="0.5"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- 主内容区 -->
    <div id="content">
      <!-- 未配对状态 -->
      <div id="not-paired" class="view active">
        <div class="icon-area">
          <div class="my-icon" id="my-icon-display" onclick="showIconPicker()">
            <svg width="64" height="64" viewBox="0 0 64 64">
              <defs>
                <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
                </filter>
              </defs>
              <circle cx="32" cy="32" r="30" fill="#E6F1FB" stroke="#378ADD" stroke-width="2" filter="url(#iconShadow)"/>
              <text x="32" y="36" text-anchor="middle" font-size="22" font-weight="600" fill="#378ADD">B</text>
            </svg>
          </div>
          <div class="icon-edit" onclick="showIconPicker()">点击更换头像</div>
        </div>

        <!-- 昵称输入 - 在配对页面上 -->
        <div class="nickname-area">
          <input type="text" id="my-name-input" placeholder="输入你的昵称" maxlength="20" class="nickname-input" autocomplete="off">
        </div>

        <div class="welcome-text">
          <h2>开始配对</h2>
          <p>与另一台 Mac 配对后，即可留言、戳一戳互动</p>
        </div>

        <div class="pair-buttons">
          <button class="btn primary" onclick="createPairCode()">
            <svg width="16" height="16" viewBox="0 0 16 16" style="margin-right:4px">
              <path d="M8 1L8 15M1 8L15 8" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
            生成配对码
          </button>
          <button class="btn secondary" onclick="showJoinPair()">
            <svg width="16" height="16" viewBox="0 0 16 16" style="margin-right:4px">
              <path d="M3 8H13M10 5L13 8L10 11" stroke="#378ADD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            输入配对码
          </button>
        </div>

        <!-- 配对码显示区 -->
        <div id="pair-code-area" class="hidden">
          <div class="pair-code-label">将此码分享给对方</div>
          <div class="pair-code" id="pair-code-display">---</div>
          <div class="pair-code-timer" id="pair-code-timer"></div>
          <button class="btn small secondary" onclick="copyPairCode()">
            <svg width="12" height="12" viewBox="0 0 12 12"><rect x="3" y="0" width="8" height="10" rx="1" stroke="#888" stroke-width="1" fill="none"/><rect x="1" y="2" width="8" height="10" rx="1" stroke="#888" stroke-width="1" fill="#F5F5F7"/></svg>
            复制
          </button>
        </div>

        <!-- 输入配对码区 -->
        <div id="join-pair-area" class="hidden">
          <div class="pair-code-label">输入对方的配对码</div>
          <input type="text" id="join-code-input" maxlength="6" placeholder="如 A3K9F2" class="code-input" autocomplete="off" spellcheck="false">
          <div class="join-actions">
            <button class="btn secondary" onclick="hideJoinPair()">取消</button>
            <button class="btn primary" onclick="joinPair()">连接</button>
          </div>
        </div>

        <div class="settings-link">
          <a onclick="showSettings()">
            <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4" stroke="#86868B" stroke-width="1.5" fill="none"/><circle cx="6" cy="6" r="1.5" fill="#86868B"/></svg>
            服务器设置
          </a>
        </div>
      </div>

      <!-- 已配对状态 -->
      <div id="paired" class="view">
        <!-- 对方状态栏 -->
        <div id="partner-header">
          <div class="partner-icon" id="partner-icon-display">
            <svg width="44" height="44" viewBox="0 0 44 44">
              <defs><filter id="partnerShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/></filter></defs>
              <circle cx="22" cy="22" r="20" fill="#CECBF6" stroke="#534AB7" stroke-width="2" filter="url(#partnerShadow)"/>
              <text x="22" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#534AB7">?</text>
            </svg>
          </div>
          <div class="partner-info">
            <div class="partner-name" id="partner-name">对方</div>
            <div class="partner-status" id="partner-status-indicator">
              <span class="status-dot unknown"></span>
              <span class="status-text">未知</span>
            </div>
          </div>
          <div class="header-actions">
            <button class="icon-btn" onclick="showSettings()" title="设置">
              <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="3.5" r="1.3" fill="#888"/><circle cx="7" cy="7" r="1.3" fill="#888"/><circle cx="7" cy="10.5" r="1.3" fill="#888"/></svg>
            </button>
            <button class="icon-btn danger" onclick="unpair()" title="取消配对">
              <svg width="14" height="14" viewBox="0 0 14 14"><line x1="2" y1="2" x2="12" y2="12" stroke="#E24B4A" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="2" x2="2" y2="12" stroke="#E24B4A" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>

        <!-- 消息区 -->
        <div id="message-area">
          <div id="message-list" class="message-list"></div>
          <div class="message-input-area">
            <textarea id="message-input" placeholder="给对方留言..." rows="1" maxlength="500"></textarea>
            <button class="btn primary send-btn" onclick="sendMessage()">
              <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 7L12 2L7 12L6 8L2 7Z" fill="white"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 设置面板（Home页） -->
    <div id="settings-panel" class="hidden overlay-panel">
      <div class="settings-header">
        <h3>个人设置</h3>
        <button class="icon-btn" onclick="hideSettings()">
          <svg width="14" height="14" viewBox="0 0 14 14"><line x1="2" y1="2" x2="12" y2="12" stroke="#888" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="2" x2="2" y2="12" stroke="#888" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="settings-avatar-area">
          <div class="settings-avatar" id="settings-avatar-display" onclick="showIconPicker()">
            <svg width="48" height="48" viewBox="0 0 48 48">
              <circle cx="24" cy="24" r="22" fill="#E6F1FB" stroke="#378ADD" stroke-width="2"/>
              <text x="24" y="28" text-anchor="middle" font-size="18" font-weight="600" fill="#378ADD">B</text>
            </svg>
          </div>
          <div class="avatar-edit-hint" onclick="showIconPicker()">更换头像</div>
        </div>

        <label>我的昵称</label>
        <input type="text" id="setting-name" placeholder="显示名称" maxlength="20">

        <label>中继服务器地址</label>
        <input type="text" id="setting-server" placeholder="wss://your-server:8443">

        <button class="btn primary" onclick="saveSettings()">保存</button>
      </div>
    </div>

    <!-- 图标选择面板 -->
    <div id="icon-picker-panel" class="hidden overlay-panel">
      <div class="settings-header">
        <h3>选择头像</h3>
        <button class="icon-btn" onclick="hideIconPicker()">
          <svg width="14" height="14" viewBox="0 0 14 14"><line x1="2" y1="2" x2="12" y2="12" stroke="#888" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="2" x2="2" y2="12" stroke="#888" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="icon-grid" id="icon-grid"></div>
      <div class="custom-icon-area">
        <button class="btn secondary" onclick="uploadCustomIcon()">上传自定义图片</button>
      </div>
    </div>

    <!-- 戳一戳动画 -->
    <div id="poke-overlay" class="hidden">
      <div class="poke-animation-content">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <defs>
            <radialGradient id="pokeGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" style="stop-color:#FAEEDA;stop-opacity:0.9"/>
              <stop offset="100%" style="stop-color:#FAEEDA;stop-opacity:0"/>
            </radialGradient>
          </defs>
          <circle cx="60" cy="60" r="55" fill="url(#pokeGlow)">
            <animate attributeName="r" values="30;55;30" dur="0.6s" repeatCount="3"/>
          </circle>
          <circle cx="60" cy="60" r="40" fill="#FAEEDA" stroke="#EF9F27" stroke-width="3">
            <animate attributeName="r" values="30;45;30" dur="0.5s" repeatCount="4"/>
            <animate attributeName="stroke-width" values="3;5;3" dur="0.5s" repeatCount="4"/>
          </circle>
          <text x="60" y="68" text-anchor="middle" font-size="24" font-weight="600" fill="#BA7517">戳!</text>
        </svg>
      </div>
    </div>

    <!-- 连接状态栏 -->
    <div id="connection-bar">
      <span id="connection-status">连接中...</span>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
